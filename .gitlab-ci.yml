    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

# Integration tests for multi-agents-service (tests/integration/).
# DB and orchestrator are mocked — SQLite is enough, no PostgreSQL service needed.
# Runs after the full test-unit stage passes.
test:integration:multi-agents-service:
  image: python:3.12-slim
  stage: test-integration
  extends: .python-cache
  timeout: 20 minutes
  variables:
    LANGCHAIN_TRACING_V2: "false"
    DATABASE_URL: "sqlite:///./ci_integration_test.db"
    OPENROUTER_API_KEY: "dummy-not-called-in-integration"
    TAVILY_API_KEY: "dummy-not-called-in-integration"
  script:
    - cd Main_Project/Backend/multi-agents-service
    - pip install --quiet uv
    - uv sync --frozen --cache-dir "$UV_CACHE_DIR"
    - |
      uv run pytest tests/integration/ \
        -m "integration and not langsmith and not slow" \
        -v \
        --junitxml=junit-integration-report.xml
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/multi-agents-service/junit-integration-report.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/multi-agents-service/**/*

# LangSmith evaluation — real LLM + Tavily calls, tiêu tốn token.
# Chạy tự động trên nhánh main; allow_failure để không chặn pipeline nếu thất bại.
# Cần CI variables: LANGCHAIN_API_KEY, OPENROUTER_API_KEY, TAVILY_API_KEY
test:langsmith:multi-agents:
  image: python:3.12-slim
  stage: test-integration
  extends: .python-cache
  timeout: 30 minutes
  allow_failure: true
  variables:
    LANGCHAIN_TRACING_V2: "true"
    LANGCHAIN_PROJECT: "${LANGCHAIN_PROJECT:-invest-advisor-ci}-$CI_COMMIT_SHORT_SHA"
    DATABASE_URL: "sqlite:///./ci_langsmith_test.db"
  script:
    - cd Main_Project/Backend/multi-agents-service
    - pip install --quiet uv
    - uv sync --frozen --cache-dir "$UV_CACHE_DIR"
    - |
      uv run pytest tests/langsmith/ \
        -m "langsmith" \
        -v \
        -s \
        --junitxml=junit-langsmith-report.xml
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/multi-agents-service/junit-langsmith-report.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: DOCKER
# Build multi-stage Dockerfiles và push lên GitLab Container Registry.
# Chạy tự động khi rules match (main/develop/tag).
# ─────────────────────────────────────────────────────────────────────────────

.docker-template:
  image: docker:24
  stage: docker
  timeout: 20 minutes
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: "plain"
  before_script:
    - docker info
