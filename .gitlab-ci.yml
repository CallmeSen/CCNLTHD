# ─────────────────────────────────────────────────────────────────────────────
# STAGE: TEST-INTEGRATION
#
# PostgreSQL: GitLab service container.
#   - POSTGRES_* vars at job level → passed to both the service container and the job.
#   - SPRING_DATASOURCE_URL env var → overrides application-docker-test.properties
#     (hostname "localhost" → "postgres" in CI, where the service container is reachable).
#   - SPRING_DATASOURCE_USERNAME / PASSWORD also set as env vars (belt-and-suspenders).
#
# Kafka:   @EmbeddedKafka — runs in-process, no external service needed.
# GreenMail: embedded SMTP — no external service needed (notification-service).
# WireMock:  embedded HTTP mock — no external service needed (portfolio-service).
#
# retry: 1 — EmbeddedKafka/GreenMail startup can occasionally race under CI load.
# ─────────────────────────────────────────────────────────────────────────────

test:integration:user-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-integration
  extends: .maven-cache-ro
  timeout: 15 minutes
  retry: 1
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: user_db_test
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/user_db_test"
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/user-service/pom.xml test -Dtest=UserServiceIntegrationTest -DfailIfNoTests=false -Djacoco.skip=true
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/user-service/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

test:integration:portfolio-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-integration
  extends: .maven-cache-ro
  timeout: 15 minutes
  retry: 1
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: portfolio_db_test
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/portfolio_db_test"
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/portfolio-service/pom.xml test -Dtest=PortfolioServiceIntegrationTest -DfailIfNoTests=false -Djacoco.skip=true
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/portfolio-service/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

test:integration:notification-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-integration
  extends: .maven-cache-ro
  timeout: 15 minutes
  retry: 1
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: notification_db_test
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/notification_db_test"
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/notification-service/pom.xml test -Dtest=NotificationServiceIntegrationTest -DfailIfNoTests=false -Djacoco.skip=true
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/notification-service/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: DOCKER
# Build multi-stage Dockerfiles and push to GitLab Container Registry.
# when: manual — requires explicit trigger in GitLab UI (prevents accidental pushes).
# needs: DAG — each service's docker job depends only on its own integration test.
#   If integration test was skipped (e.g., feature branch), docker job is also skipped.
#   optional: true → allow docker job to proceed even if integration test was skipped.
# ─────────────────────────────────────────────────────────────────────────────

.docker-template:
  image: docker:24
  stage: docker
  timeout: 20 minutes
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG =~ /^v.*/

docker:user-service:
  extends: .docker-template
  needs:
    - job: test:integration:user-service
      optional: true
    - job: build:user-service
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/user-service"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Backend/user-service/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"

docker:portfolio-service:
  extends: .docker-template
  needs:
    - job: test:integration:portfolio-service
      optional: true
    - job: build:portfolio-service
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/portfolio-service"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Backend/portfolio-service/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"

docker:notification-service:
  extends: .docker-template
  needs:
    - job: test:integration:notification-service
      optional: true
    - job: build:notification-service
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/notification-service"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Backend/notification-service/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"

docker:api-gateway:
  extends: .docker-template
  needs:
    - job: build:api-gateway
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/api-gateway"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Backend/api-gateway/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"

docker:eureka-server:
  extends: .docker-template
  needs:
    - job: build:eureka-server
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/eureka-server"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Backend/eureka-server/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"

docker:market-data-service:
  extends: .docker-template
  needs:
    - job: test:unit:market-data-service
      optional: true
    - job: build:market-data-service
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/market-data-service"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Backend/market-data-service/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"

docker:frontend:
  extends: .docker-template
  needs:
    - job: build:frontend
      optional: true
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/frontend"
    - docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" Main_Project/Frontend/
    - docker push "$IMAGE:$IMAGE_TAG" && docker push "$IMAGE:latest"
