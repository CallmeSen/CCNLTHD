    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

test:unit:market-data-service:
  image: python:3.12-slim
  stage: test-unit
  timeout: 10 minutes
  script:
    - cd Main_Project/Backend/market-data-service
    - pip install --quiet -r requirements.txt -r requirements-test.txt
    - pytest tests/ -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=54 --junitxml=junit-report.xml
  coverage: '/TOTAL.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/market-data-service/junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: Main_Project/Backend/market-data-service/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/market-data-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# Unit tests only (tests/unit/) — no external LLM/DB/Tavily calls.
# LANGCHAIN_TRACING_V2=false prevents accidental LangSmith noise.
test:unit:multi-agents-service:
  image: python:3.12-slim
  stage: test-unit
  extends: .python-cache
  timeout: 15 minutes
  variables:
    LANGCHAIN_TRACING_V2: "false"
    DATABASE_URL: "sqlite:///./ci_unit_test.db"
    OPENROUTER_API_KEY: "dummy-not-called-in-unit"
    TAVILY_API_KEY: "dummy-not-called-in-unit"
  script:
    - cd Main_Project/Backend/multi-agents-service
    - pip install --quiet uv
    - uv sync --frozen --cache-dir "$UV_CACHE_DIR"
    - |
      uv run pytest tests/unit/ \
        -m "not langsmith and not slow" \
        -v \
        --cov=src \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --junitxml=junit-unit-report.xml
  coverage: '/TOTAL.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/multi-agents-service/junit-unit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: Main_Project/Backend/multi-agents-service/coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/multi-agents-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: TEST-INTEGRATION
#
# Java services: PostgreSQL service container + EmbeddedKafka/GreenMail/WireMock in-process.
# multi-agents-service:
#   - tests/integration/ — API + orchestrator tests use mocked DB (SQLite fallback).
#   - tests/langsmith/   — real LLM + Tavily calls, when: manual, only on main.
# ─────────────────────────────────────────────────────────────────────────────

test:integration:user-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-integration
  extends: .maven-cache-ro
  timeout: 15 minutes
  retry: 1
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: user_db_test
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/user_db_test"
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/user-service/pom.xml test -Dtest=UserServiceIntegrationTest -DfailIfNoTests=false -Djacoco.skip=true
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/user-service/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

test:integration:portfolio-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-integration
  extends: .maven-cache-ro
  timeout: 15 minutes
  retry: 1
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: portfolio_db_test
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/portfolio_db_test"
    SPRING_DATASOURCE_USERNAME: postgres
    SPRING_DATASOURCE_PASSWORD: postgres
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/portfolio-service/pom.xml test -Dtest=PortfolioServiceIntegrationTest -DfailIfNoTests=false -Djacoco.skip=true
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/portfolio-service/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

test:integration:notification-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-integration
  extends: .maven-cache-ro
  timeout: 15 minutes
  retry: 1
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: notification_db_test
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/notification_db_test"
