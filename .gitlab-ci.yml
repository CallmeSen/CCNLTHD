      changes:
        - Main_Project/Backend/notification-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

test:unit:api-gateway:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-unit
  extends: .maven-cache-ro
  timeout: 10 minutes
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/api-gateway/pom.xml test
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/api-gateway/target/surefire-reports/TEST-*.xml
    paths:
