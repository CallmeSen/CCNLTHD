    paths:
      - Main_Project/Backend/portfolio-service/target/surefire-reports/
      - Main_Project/Backend/portfolio-service/target/site/jacoco/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/portfolio-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

