build:market-data-service:
  image: python:3.12-slim
  stage: build
  timeout: 10 minutes
  script:
    - cd Main_Project/Backend/market-data-service
    - pip install --quiet -r requirements.txt
    - python -c "import app.main" 2>/dev/null || python -m py_compile main.py
    - echo "Python syntax OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/market-data-service/**/*

build:frontend:
  image: node:20-alpine
  stage: build
  extends: .npm-cache
  timeout: 15 minutes
  script:
    - cd Main_Project/Frontend
    - npm ci
    - VITE_API_URL=/api npm run build
  artifacts:
    paths:
      - Main_Project/Frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Frontend/**/*

build:multi-agents-service:
  image: python:3.12-slim
  stage: build
  extends: .python-cache
  timeout: 15 minutes
  script:
    - cd Main_Project/Backend/multi-agents-service
    - pip install --quiet uv
    - uv sync --frozen --no-install-project --no-dev --cache-dir "$UV_CACHE_DIR"
    - python -c "import src.fin_agents.api.main" 2>/dev/null || echo "Import check skipped — OK"
    - echo "Python syntax OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/multi-agents-service/**/*

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: TEST-UNIT
# Java: mvn test (Surefire excludes *IntegrationTest classes via pom.xml config)
# Python: pytest tests/unit/ only — no external services needed.
# ─────────────────────────────────────────────────────────────────────────────

test:unit:user-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-unit
  extends: .maven-cache-ro
  timeout: 10 minutes
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/user-service/pom.xml test
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/user-service/target/surefire-reports/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
        path: Main_Project/Backend/user-service/target/site/jacoco/jacoco.xml
    paths:
      - Main_Project/Backend/user-service/target/surefire-reports/
      - Main_Project/Backend/user-service/target/site/jacoco/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/user-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

test:unit:portfolio-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: test-unit
  extends: .maven-cache-ro
  timeout: 10 minutes
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/portfolio-service/pom.xml test
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    reports:
      junit: Main_Project/Backend/portfolio-service/target/surefire-reports/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
