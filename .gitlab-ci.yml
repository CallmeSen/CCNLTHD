    - pip install --quiet uv
    - pip install --quiet -e . 2>/dev/null || pip install --quiet -r requirements.txt 2>/dev/null || true
    - python -c "import src.fin_agents.api.main" 2>/dev/null || python -c "import src.api.main" 2>/dev/null || echo "Python syntax check skipped — package structure varies by environment"
    - echo "Python syntax OK"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH
