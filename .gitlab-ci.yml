# ──────────────────────────────────────────────────────────────────────────────
# InvestAdvisor — GitLab CI Pipeline
# Remote: https://gitlab.com/callmesen-group/CCNLTHD.git
# Source: Main_Project/Backend/ and Main_Project/Frontend/
#
# Stages: validate → build → test-unit → test-integration → docker → deploy
#
# Key design decisions:
#   - Java integration tests use GitLab PostgreSQL service containers.
#   - Python unit+integration tests use SQLite in-memory (DB is mocked or SQLite default).
#   - Dockerfiles are multi-stage (maven inside Docker), docker jobs compile from source.
#   - docker stage runs automatically when its rules match — images are pushed to the registry.
#   - deploy stage has 2 independent flows, both `when: manual`:
#       Luồng 1 — deploy:oracle  : SSH vào Oracle Cloud VM, git pull, docker compose up.
#       Luồng 2 — deploy:manifest: cập nhật image tag k8s manifests → ArgoCD sync.
#
# ── Required GitLab CI/CD Variables (Settings → CI/CD → Variables) ────────────
#
#   Secrets / API keys (protected + masked):
#     JWT_SECRET            → Spring Boot JWT signing key
#     DB_PASSWORD           → PostgreSQL password (production)
#     OPENROUTER_API_KEY    → OpenRouter / OpenAI-compatible LLM
#     TAVILY_API_KEY        → Tavily web search (market news)
#     VNSTOCK_API_KEY       → VNStock data API
#     LANGCHAIN_API_KEY     → LangSmith tracing + evaluation
#     MAIL_USERNAME         → SMTP username (notification-service)
#     MAIL_PASSWORD         → SMTP password (notification-service)
#     GITLAB_API_TOKEN      → Personal/project token with write_repository scope
#                             (needed by deploy:manifest to push k8s manifest updates)
#
#   Oracle Cloud deploy (protected):
#     ORACLE_HOST           → IP của VM, e.g. 161.118.195.15
#     ORACLE_USER           → ubuntu
#     ORACLE_SSH_KEY        → type: File — nội dung private key .pem (chmod 600)
#
#   Cluster bootstrap (manual, outside CI):
#     KUBECONFIG            → kubeconfig for kubectl/helm setup when needed
#
#   Optional (có default):
#     LANGCHAIN_PROJECT     → default: invest-advisor-ci
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - build
  - test-unit
  - test-integration
  - docker
  - deploy

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx512m"
  MAVEN_CLI: "--batch-mode --errors --no-transfer-progress"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Cache templates ───────────────────────────────────────────────────────────

.maven-cache-rw:
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
    policy: pull-push

.maven-cache-ro:
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
    policy: pull

.npm-cache:
  cache:
    key:
      prefix: npm
      files:
        - Main_Project/Frontend/package-lock.json
    paths:
      - Main_Project/Frontend/node_modules/

.python-cache:
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
  cache:
    key: "uv-multi-agents-$CI_COMMIT_REF_SLUG"
    paths:
      - .uv-cache/
    policy: pull

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: VALIDATE
# ─────────────────────────────────────────────────────────────────────────────

validate:java:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: validate
  extends: .maven-cache-ro
  timeout: 5 minutes
  script:
    - |
      for svc in api-gateway eureka-server user-service portfolio-service notification-service; do
        echo "=== Validating $svc ==="
        mvn $MAVEN_CLI -f Main_Project/Backend/$svc/pom.xml validate
      done
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

validate:python:
  image: python:3.12-slim
  stage: validate
  extends: .python-cache
  timeout: 5 minutes
  script:
    - pip install --quiet uv
    - uv pip install --system --cache-dir "$UV_CACHE_DIR" flake8
    - flake8 Main_Project/Backend/market-data-service/app/ --max-line-length=120 --ignore=E501,W503,F401,E712,E302,E305,E241,W291,W292,W293,E226,E402,F541,F841,E741,F811 --exclude=__pycache__
    - flake8 Main_Project/Backend/multi-agents-service/src/ --max-line-length=120 --ignore=E501,W503,F401,E712,E302,E305,E241,W291,W292,W293,E226,E402,F541,F841,E741,F811 --exclude=__pycache__
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/market-data-service/**/*
        - Main_Project/Backend/multi-agents-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

validate:frontend:
  image: node:20-alpine
  stage: validate
  extends: .npm-cache
  timeout: 10 minutes
  script:
    - cd Main_Project/Frontend
    - npm ci
    - npm run lint
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: BUILD
# ─────────────────────────────────────────────────────────────────────────────

build:user-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: build
  extends: .maven-cache-rw
  timeout: 15 minutes
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/user-service/pom.xml clean package -DskipTests
  artifacts:
    paths:
      - Main_Project/Backend/user-service/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/user-service/**/*

