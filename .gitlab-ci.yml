# ─────────────────────────────────────────────────────────────────────────────
# STAGE: DEPLOY — 2 luồng độc lập, cả 2 đều when: manual
#
# Luồng 1 — Oracle Cloud VM (deploy:oracle):
#   SSH vào VM → git pull → docker compose up --build (backend + monitoring + frontend).
#   Không cần docker stage. Code được build trực tiếp trên VM.
#   Cần: ORACLE_HOST, ORACLE_USER, ORACLE_SSH_KEY (type: File).
#
# Luồng 2 — ArgoCD / Kubernetes (deploy:manifest + External Secrets):
#   Cần docker stage đã push images lên registry trước.
#   deploy:manifest: cập nhật image tag trong k8s/*.yaml → commit → ArgoCD tự sync.
#   Secrets: External Secrets Operator reads Vault and creates Kubernetes Secrets.
#   Cần: GITLAB_API_TOKEN (write_repository scope); ESO/Vault handles runtime secrets.
# ─────────────────────────────────────────────────────────────────────────────

# ── Luồng 1: Oracle Cloud VM ──────────────────────────────────────────────────
deploy:oracle:
  stage: deploy
  image: alpine:3.19
  timeout: 20 minutes
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache openssh-client
    - printf '%s' "$ORACLE_SSH_KEY_B64" | base64 -d > /tmp/oracle_key
    - chmod 600 /tmp/oracle_key
  script:
    - |
      ssh -o StrictHostKeyChecking=no \
          -o ConnectTimeout=30 \
          -o ServerAliveInterval=60 \
          -i /tmp/oracle_key \
          "${ORACLE_USER}@${ORACLE_HOST}" << 'ENDSSH'
        set -e

        echo "=== [1/4] Pulling latest code ==="
        cd ~/CCNLTHD
        git fetch origin main
        git reset --hard origin/main

        echo "=== [2/4] Restarting backend + monitoring ==="
        cd Main_Project/Backend
        docker compose -f docker-compose.yml -f docker-compose.monitoring.yml \
          up -d --build --remove-orphans

        echo "=== [3/4] Restarting frontend ==="
        cd ~/CCNLTHD/Main_Project/Frontend
        docker compose -f docker-compose.frontend.yml \
          up -d --build --remove-orphans

        echo "=== [4/4] Running containers ==="
        docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "=== Deploy complete ==="
      ENDSSH

# ── Luồng 2: Kubernetes / ArgoCD ─────────────────────────────────────────────

# Cập nhật image tags trong Kubernetes overlay rồi push → ArgoCD tự sync.
# GITLAB_API_TOKEN cần scope: write_repository
deploy:manifest:
  stage: deploy
  image: alpine/git:latest
  timeout: 5 minutes
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
  before_script:
    - git config user.email "ci@gitlab.com"
    - git config user.name "GitLab CI"
    # Cấu hình remote với token để push được (HTTPS with token auth)
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      echo "=== Updating image tags in Kubernetes prod overlay ==="
      SERVICES="eureka-server api-gateway user-service market-data-service portfolio-service notification-service multi-agents-service frontend"
      MANIFEST="deployment/kubernetes/overlays/prod/kustomization.yaml"
      CHANGED=0
      for svc in $SERVICES; do
        if grep -q "/${svc}$" "$MANIFEST"; then
          sed -i "/name: .*\/${svc}$/,/newTag:/ s|newTag: .*|newTag: ${IMAGE_TAG}|g" "$MANIFEST"
          echo "  Updated $svc -> ${IMAGE_TAG}"
          CHANGED=1
        else
          echo "  Skipping $svc (image entry not found)"
        fi
      done

      if [ "$CHANGED" -eq 0 ]; then
        echo "No image entries found — check $MANIFEST."
        exit 1
      fi

    - |
      echo "=== Committing manifest updates ==="
      git add deployment/kubernetes/
      if git diff --cached --quiet; then
        echo "No manifest changes — skipping push."
      else
        git commit -m "chore(kubernetes): update images to ${IMAGE_TAG} [skip ci]"
        git push origin "$CI_COMMIT_BRANCH"
        echo "Pushed. ArgoCD will sync automatically."
      fi

# Legacy secret apply flow is disabled; ESO now reconciles Secrets from Vault.
.deploy:secrets:legacy:
  stage: deploy
  image: bitnami/kubectl:latest
  timeout: 5 minutes
  rules:
    - when: never
  script:
    - echo "Disabled. External Secrets Operator manages Kubernetes Secrets from Vault."
