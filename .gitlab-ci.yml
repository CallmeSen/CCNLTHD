# ──────────────────────────────────────────────────────────────────────────────
# InvestAdvisor — GitLab CI Pipeline
# Remote: https://gitlab.com/callmesen-group/CCNLTHD.git
# Source: Main_Project/Backend/ and Main_Project/Frontend/
#
# Stages: validate → build → test-unit → test-integration → docker
#
# Key design decisions:
#   - Integration tests use GitLab PostgreSQL service containers (no DinD/Testcontainers).
#     SPRING_DATASOURCE_URL env var overrides the docker-test profile property.
#     Kafka → @EmbeddedKafka (in-process). GreenMail/WireMock → also in-process.
#   - Dockerfiles are multi-stage (maven inside Docker), so docker jobs compile
#     from source and do NOT need JAR artifacts from build stage.
#   - docker stage is `when: manual` — prevents accidental image pushes on every push.
#   - needs: on docker jobs → DAG: each service's docker job starts as soon as its
#     own integration test passes, without waiting for other services.
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   JWT_SECRET     → protected, masked
#   DB_PASSWORD    → protected, masked
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - build
  - test-unit
  - test-integration
  - docker

# ── Defaults ──────────────────────────────────────────────────────────────────
# interruptible: cancel running pipeline when a newer commit is pushed to the same branch.
# retry: only retry on runner/infrastructure failure, not on test logic failure.

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx512m"
  MAVEN_CLI: "--batch-mode --errors --no-transfer-progress"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Cache templates ───────────────────────────────────────────────────────────
# pull-push: build jobs update the cache after downloading dependencies.
# pull:      test/validate jobs only read from cache (no write contention).

.maven-cache-rw:
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
    policy: pull-push

.maven-cache-ro:
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
    policy: pull

.npm-cache:
  cache:
    key:
      prefix: npm
      files:
        - Main_Project/Frontend/package-lock.json
    paths:
      - Main_Project/Frontend/node_modules/

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: VALIDATE
# ─────────────────────────────────────────────────────────────────────────────

validate:java:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: validate
  extends: .maven-cache-ro
  timeout: 5 minutes
  script:
    - |
      for svc in api-gateway eureka-server user-service portfolio-service notification-service; do
        echo "=== Validating $svc ==="
        mvn $MAVEN_CLI -f Main_Project/Backend/$svc/pom.xml validate
      done
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

validate:python:
  image: python:3.12-slim
  stage: validate
  timeout: 5 minutes
  script:
    - pip install --quiet flake8
    - flake8 Main_Project/Backend/market-data-service/app/ --max-line-length=120 --ignore=E501,W503,F401,E712,E302,E305,E241 --exclude=__pycache__
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/market-data-service/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

validate:frontend:
  image: node:20-alpine
  stage: validate
  extends: .npm-cache
  timeout: 10 minutes
  script:
    - cd Main_Project/Frontend
    - npm ci
    - npm run lint
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE: BUILD
# compile + package (skip tests). Verifies the project is buildable.
# ─────────────────────────────────────────────────────────────────────────────

build:user-service:
  image: maven:3.9.6-eclipse-temurin-17-alpine
  stage: build
  extends: .maven-cache-rw
  timeout: 15 minutes
  script:
    - mvn $MAVEN_CLI -f Main_Project/Backend/user-service/pom.xml clean package -DskipTests
  artifacts:
    paths:
      - Main_Project/Backend/user-service/target/*.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH
      changes:
        - Main_Project/Backend/user-service/**/*

