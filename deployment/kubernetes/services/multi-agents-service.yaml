apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agents-service
  namespace: investadvisor
  labels:
    app: multi-agents-service
    app.kubernetes.io/name: multi-agents-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multi-agents-service
  template:
    metadata:
      labels:
        app: multi-agents-service
    spec:
      containers:
        - name: multi-agents-service
          image: registry.gitlab.com/callmesen-group/ccnlthd/multi-agents-service:latest
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://user:REPLACE_DB_PASSWORD@postgres-ma.investadvisor.svc.cluster.local:5432/financial_advisor"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENAI_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TAVILY_API_KEY
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KAFKA_BROKERS
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: EUREKA_HOST
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: multi-agents-service
  namespace: investadvisor
spec:
  selector:
    app: multi-agents-service
  ports:
    - port: 8086
      targetPort: 8086
      name: http
  type: ClusterIP
