apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: investadvisor-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: investadvisor-platform
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: investadvisor
spec:
  project: default
  source:
    repoURL: https://gitlab.com/callmesen-group/CCNLTHD.git
    targetRevision: main
    path: deployment/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
