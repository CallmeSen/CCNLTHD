# Local/dev Vault bootstrap only. Production Vault policies and auth roles
# should be managed by hardened Vault IaC or an approved secrets platform flow.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-dev-bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/name: vault-dev-bootstrap
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: investadvisor
    app.kubernetes.io/component: secrets-store-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://gitlab.com/callmesen-group/CCNLTHD.git
    targetRevision: main
    path: deployment/kubernetes/platform/vault-dev-bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
