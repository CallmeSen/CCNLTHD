apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: investadvisor
  namespace: argocd
  labels:
    app.kubernetes.io/name: investadvisor
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/callmesen-group/CCNLTHD.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: investadvisor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
