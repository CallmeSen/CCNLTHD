apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: investadvisor
  namespace: argocd
  labels:
    app.kubernetes.io/name: investadvisor
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/callmesen-group/CCNLTHD.git
    targetRevision: main
    path: deployment/kubernetes/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: investadvisor
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/persistentVolumeClaimRetentionPolicy
        - /spec/volumeClaimTemplates
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
