apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: multi-agents-service-scaledobject
  namespace: investadvisor
  labels:
    app: multi-agents-service
spec:
  scaleTargetRef:
    name: multi-agents-service
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 10
  fallback:
    failureThreshold: 3
    replicas: 2
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 4
              periodSeconds: 15
          selectPolicy: Max
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.monitoring.svc.cluster.local:9090
        metricName: active_sse_connections
        threshold: "10"
        query: sum(sse_active_connections{service="multi-agents-service"}[2m])
    - type: cpu
      metadata:
        type: Utilization
        value: "70"
