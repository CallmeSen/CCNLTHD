apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces/namespace.yaml
  - configmaps/postgres-initdb-config.yaml
  - configmaps/backend-config.yaml
  - configmaps/frontend-config.yaml
  - configmaps/multi-agents-config.yaml
  - services/svc-postgres.yaml
  - services/svc-postgres-ma.yaml
  - services/svc-zookeeper.yaml
  - services/svc-kafka.yaml
  - services/svc-postgres-nodeport.yaml
  - services/svc-postgres-ma-nodeport.yaml
  - services/svc-zookeeper-nodeport.yaml
  - services/svc-kafka-nodeport.yaml
  - services/svc-kafka-ui.yaml
  - deployments/postgres-deploy.yaml
  - deployments/postgres-ma-deploy.yaml
  - deployments/zookeeper-deploy.yaml
  - deployments/kafka-deploy.yaml
  - deployments/kafka-ui-deploy.yaml
  - deployments/eureka-server-deploy.yaml
  - deployments/api-gateway-deploy.yaml
  - deployments/user-service-deploy.yaml
  - deployments/market-data-service-deploy.yaml
  - deployments/portfolio-service-deploy.yaml
  - deployments/notification-service-deploy.yaml
  - deployments/multi-agents-service-deploy.yaml
  - deployments/frontend-deploy.yaml
  - services/svc-eureka-server.yaml
  - services/svc-api-gateway.yaml
  - services/svc-user-service.yaml
  - services/svc-market-data-service.yaml
  - services/svc-portfolio-service.yaml
  - services/svc-notification-service.yaml
  - services/svc-multi-agents-service.yaml
  - services/svc-frontend.yaml
  - ingress/ingress.yaml
  - vpa/vpa-api-gateway.yaml
  - vpa/vpa-user-service.yaml
  - vpa/vpa-market-data-service.yaml
  - vpa/vpa-portfolio-service.yaml
  - vpa/vpa-notification-service.yaml
  - vpa/vpa-multi-agents-service.yaml
  - vpa/vpa-eureka-server.yaml
  - vpa/vpa-frontend.yaml
  - servicemonitors/servicemonitor-api-gateway.yaml
  - servicemonitors/servicemonitor-user-service.yaml
  - servicemonitors/servicemonitor-market-data-service.yaml
  - servicemonitors/servicemonitor-portfolio-service.yaml
  - servicemonitors/servicemonitor-notification-service.yaml
  - servicemonitors/servicemonitor-multi-agents-service.yaml
  - servicemonitors/servicemonitor-eureka-server.yaml
  - servicemonitors/servicemonitor-frontend.yaml
  - keda/scaledobjects.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: investadvisor

images:
  - name: registry.gitlab.com/callmesen-group/ccnlthd/api-gateway
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/user-service
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/market-data-service
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/portfolio-service
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/notification-service
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/multi-agents-service
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/eureka-server
    newTag: latest
  - name: registry.gitlab.com/callmesen-group/ccnlthd/frontend
    newTag: latest

replicas:
  - name: api-gateway
    count: 2
  - name: user-service
    count: 2
  - name: market-data-service
    count: 2
  - name: portfolio-service
    count: 2
  - name: notification-service
    count: 1
  - name: multi-agents-service
    count: 2
  - name: eureka-server
    count: 1
  - name: frontend
    count: 2
