apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: eureka-server-monitor
  namespace: investadvisor
  labels:
    app: eureka-server
    app.kubernetes.io/name: eureka-server
    app.kubernetes.io/part-of: investadvisor
    monitoring: prometheus
spec:
  jobLabel: eureka-server
  selector:
    matchLabels:
      app: eureka-server
  namespaceSelector:
    matchNames:
      - investadvisor
  endpoints:
    - port: eureka
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 15s
      honorLabels: true
  metricRelabelings:
    - sourceLabels:
        - __name__
      regex: "^(jvm_.*|process_.*|system_.*|up)$"
      action: keep
