apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-service-monitor
  namespace: investadvisor
  labels:
    app: user-service
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: investadvisor
    monitoring: prometheus
spec:
  jobLabel: user-service
  selector:
    matchLabels:
      app: user-service
  namespaceSelector:
    matchNames:
      - investadvisor
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
      metricRelabelings:
        - sourceLabels:
            - __name__
          regex: "^(http_server_requests_seconds_.*|jvm_.*|process_.*|system_.*)$"
          action: keep
