apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: market-data-service-monitor
  namespace: investadvisor
  labels:
    app: market-data-service
    app.kubernetes.io/name: market-data-service
    app.kubernetes.io/part-of: investadvisor
    monitoring: prometheus
spec:
  jobLabel: market-data-service
  selector:
    matchLabels:
      app: market-data-service
  namespaceSelector:
    matchNames:
      - investadvisor
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
  metricRelabelings:
    - sourceLabels:
        - __name__
      regex: "^(http_server_requests_seconds_.*|jvm_.*|process_.*|system_.*)$"
      action: keep
