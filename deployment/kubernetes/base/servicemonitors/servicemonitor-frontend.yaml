apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frontend-monitor
  namespace: investadvisor
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: investadvisor
    monitoring: prometheus
spec:
  jobLabel: frontend
  selector:
    matchLabels:
      app: frontend
  namespaceSelector:
    matchNames:
      - investadvisor
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 15s
      honorLabels: true
  metricRelabelings:
    - sourceLabels:
        - __name__
      regex: "^(nginx_.*|http_requests_total|http_request_duration_seconds)$"
      action: keep
