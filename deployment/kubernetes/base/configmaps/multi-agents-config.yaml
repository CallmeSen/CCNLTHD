apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-agents-config
  namespace: investadvisor
data:
  POSTGRES_USER: "user"
  POSTGRES_DB: "financial_advisor"
  API_HOST: "0.0.0.0"
  API_PORT: "8086"
  API_RELOAD: "false"
  LLM_MODEL: "google/gemini-3-flash-preview"
  LLM_TEMPERATURE: "0.1"
  LLM_MAX_RETRIES: "2"
  LOG_LEVEL: "INFO"
  LOG_FILE: "/tmp/app.log"
  ALGORITHM: "HS256"
  ENABLE_AUDIT_LOGGING: "true"
  ENABLE_HUMAN_REVIEW: "true"
  ENABLE_CRITIC_AGENT: "true"
  STORAGE_PATH: "/app/storage"
  BENCHMARK_TICKER: "^GSPC"
  RISK_FREE_RATE: "0.045"
  EXPECTED_MARKET_RETURN: "0.09"
  USER_SERVICE_URL: "http://user-service.investadvisor.svc.cluster.local:8081"
  MARKET_DATA_SERVICE_URL: "http://market-data-service.investadvisor.svc.cluster.local:8082"
  PORTFOLIO_SERVICE_URL: "http://portfolio-service.investadvisor.svc.cluster.local:8083"
  NOTIFICATION_SERVICE_URL: "http://notification-service.investadvisor.svc.cluster.local:8084"
