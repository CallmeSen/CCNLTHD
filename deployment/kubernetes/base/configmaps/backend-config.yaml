apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: investadvisor
data:
  # Database
  DB_HOST: "postgres.investadvisor.svc.cluster.local"
  DB_PORT: "5432"
  DB_USERNAME: "postgres"

  # Kafka
  KAFKA_BROKERS: "kafka.investadvisor.svc.cluster.local:9092"

  # Service Discovery
  EUREKA_HOST: "eureka-server.investadvisor.svc.cluster.local"
  EUREKA_PORT: "8761"

  # Market Data
  MARKET_DATA_HOST: "market-data-service.investadvisor.svc.cluster.local"
  MARKET_DATA_PORT: "8082"

  # API Gateway
  API_GATEWAY_PORT: "8080"

  # CORS
  CORS_ALLOWED_ORIGINS: "https://investadvisor.example.com,http://localhost:5173,http://localhost:3000"

  # Gateway timeouts
  GATEWAY_RESPONSE_TIMEOUT: "300"
  GATEWAY_CONNECT_TIMEOUT: "10"
