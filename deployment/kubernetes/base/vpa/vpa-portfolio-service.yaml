apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: portfolio-service-vpa
  namespace: investadvisor
  labels:
    app: portfolio-service
    app.kubernetes.io/name: portfolio-service
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portfolio-service
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 2
  resourcePolicy:
    containerPolicies:
      - containerName: portfolio-service
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits
