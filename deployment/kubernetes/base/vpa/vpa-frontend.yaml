apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: frontend-vpa
  namespace: investadvisor
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 2
  resourcePolicy:
    containerPolicies:
      - containerName: frontend
        minAllowed:
          cpu: 10m
          memory: 32Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
        controlledResources:
          - cpu
          - memory
        controlledValues: RequestsAndLimits
