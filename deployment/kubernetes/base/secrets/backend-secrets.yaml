apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: investadvisor
type: Opaque
# NOTE: In production, never commit real secrets here.
# Use SealedSecrets, ExternalSecrets, or inject via CI job.
# The CI/CD pipeline (deploy:secrets job) fills these from GitLab CI Variables.
stringData:
  JWT_SECRET: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "REPLACE_ME"
  OPENROUTER_API_KEY: "REPLACE_ME"
  TAVILY_API_KEY: "REPLACE_ME"
  VNSTOCK_API_KEY: "REPLACE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: mail-secrets
  namespace: investadvisor
type: Opaque
stringData:
  MAIL_USERNAME: "REPLACE_ME"
  MAIL_PASSWORD: "REPLACE_ME"
