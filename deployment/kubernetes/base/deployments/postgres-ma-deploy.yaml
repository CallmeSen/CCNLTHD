apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-ma
  namespace: investadvisor
  labels:
    app: postgres-ma
    app.kubernetes.io/name: postgres-ma
spec:
  serviceName: postgres-ma
  replicas: 1
  selector:
    matchLabels:
      app: postgres-ma
  template:
    metadata:
      labels:
        app: postgres-ma
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: POSTGRES_MA_PASSWORD
            - name: POSTGRES_DB
              value: "financial_advisor"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: postgres-ma-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "financial_advisor"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "financial_advisor"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-ma-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
