apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: investadvisor
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: registry.gitlab.com/callmesen-group/ccnlthd/api-gateway:latest
          ports:
            - containerPort: 8080
              name: gateway
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: EUREKA_HOST
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KAFKA_BROKERS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: MULTI_AGENTS_HOST
              value: "multi-agents-service.investadvisor.svc.cluster.local"
            - name: SPRING_AUTOCONFIGURE_EXCLUDE
              value: "org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration"
            - name: SPRING_CLOUD_GATEWAY_HTTP_CLIENT_RESPONSE_TIMEOUT
              value: "300000"
            - name: SPRING_CLOUD_GATEWAY_HTTP_CLIENT_CONNECT_TIMEOUT
              value: "10000"
            - name: SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_0
              value: "https://investadvisor.example.com"
            - name: SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_1
              value: "http://localhost:5173"
            - name: SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_2
              value: "http://localhost:3000"
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
