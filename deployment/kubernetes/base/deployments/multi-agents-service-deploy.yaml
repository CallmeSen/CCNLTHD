apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agents-service
  namespace: investadvisor
  labels:
    app: multi-agents-service
    app.kubernetes.io/name: multi-agents-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multi-agents-service
  template:
    metadata:
      labels:
        app: multi-agents-service
    spec:
      containers:
        - name: multi-agents-service
          image: registry.gitlab.com/callmesen-group/ccnlthd/multi-agents-service:latest
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENROUTER_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENROUTER_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TAVILY_API_KEY
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: KAFKA_BROKERS
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: EUREKA_HOST
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
