apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: investadvisor-ingress
  namespace: investadvisor
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - investadvisor.example.com
      secretName: investadvisor-tls
  rules:
    - host: investadvisor.example.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /api/ai/
            pathType: Prefix
            backend:
              service:
                name: multi-agents-service
                port:
                  number: 8086
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
