---
- name: Create GitLab registry image pull secret
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../../../.."
    generated_artifacts_dir: "{{ repo_root }}/deployment/ansible/proxmox/artifacts"
    kubeconfig_path: "{{ generated_artifacts_dir }}/k3s.kubeconfig"
    investadvisor_namespace: investadvisor
    gitlab_registry_server: registry.gitlab.com
    gitlab_registry_secret_name: gitlab-registry

  tasks:
    - name: Ensure app namespace exists
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ investadvisor_namespace }}"

    - name: Create docker config JSON
      ansible.builtin.set_fact:
        gitlab_registry_dockerconfig:
          auths:
            "{{ gitlab_registry_server }}":
              username: "{{ vault_gitlab_registry_username }}"
              password: "{{ vault_gitlab_registry_token }}"
              auth: "{{ (vault_gitlab_registry_username ~ ':' ~ vault_gitlab_registry_token) | b64encode }}"
      no_log: true

    - name: Apply GitLab registry pull secret
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ gitlab_registry_secret_name }}"
            namespace: "{{ investadvisor_namespace }}"
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ gitlab_registry_dockerconfig | to_json | b64encode }}"
      no_log: true

    - name: Attach pull secret to default service account
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: default
            namespace: "{{ investadvisor_namespace }}"
          imagePullSecrets:
            - name: "{{ gitlab_registry_secret_name }}"
