---
- name: Seed HashiCorp Vault dev KV paths for External Secrets
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Wait for Vault dev pod to exist
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ hashicorp_vault_namespace }}"
          - get
          - "pod/{{ hashicorp_vault_pod }}"
      register: vault_pod_lookup
      until: vault_pod_lookup.rc == 0
      retries: 60
      delay: 5
      changed_when: false

    - name: Wait for Vault dev pod to become ready
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ hashicorp_vault_namespace }}"
          - wait
          - "--for=condition=Ready"
          - "pod/{{ hashicorp_vault_pod }}"
          - "--timeout=300s"
      changed_when: false

    - name: Write secret set into HashiCorp Vault
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - -n
          - "{{ hashicorp_vault_namespace }}"
          - exec
          - "{{ hashicorp_vault_pod }}"
          - --
          - sh
          - -c
          - "cat >/tmp/{{ item.name }}.json && VAULT_ADDR={{ hashicorp_vault_addr }} VAULT_TOKEN={{ vault_hashicorp_token }} vault kv put {{ hashicorp_vault_kv_mount }}/{{ item.path }} @/tmp/{{ item.name }}.json && rm -f /tmp/{{ item.name }}.json"
        stdin: "{{ item.data | to_json }}"
      loop: "{{ hashicorp_vault_secret_sets }}"
      no_log: true
