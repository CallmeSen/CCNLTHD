---
- name: Install K3s server and agent nodes
  hosts: k3s_cluster
  become: true
  gather_facts: true
  vars:
    k3s_become: true
    k3s_become_for_all: true
    k3s_become_for_install_dir: true
    k3s_become_for_package_install: true
    k3s_become_for_usr_local_bin: true
    k3s_build_cluster: true
    k3s_release_version: stable
    k3s_registration_address: "{{ hostvars[groups['k3s_server'][0]].ansible_host }}"
    k3s_server:
      disable:
        - traefik
      write-kubeconfig-mode: "0644"
    k3s_agent: {}

  roles:
    - role: xanmanning.k3s

- name: Fetch kubeconfig from K3s server
  hosts: k3s_server
  become: true
  gather_facts: false
  run_once: true
  vars:
    repo_root: "{{ playbook_dir }}/../../../.."
    generated_artifacts_dir: "{{ repo_root }}/deployment/ansible/proxmox/artifacts"
    kubeconfig_path: "{{ generated_artifacts_dir }}/k3s.kubeconfig"

  tasks:
    - name: Ensure local artifacts directory exists
      ansible.builtin.file:
        path: "{{ generated_artifacts_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Fetch kubeconfig
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ kubeconfig_path }}"
        flat: true

    - name: Point kubeconfig at K3s server IP
      ansible.builtin.replace:
        path: "{{ kubeconfig_path }}"
        regexp: "https://127\\.0\\.0\\.1:6443"
        replace: "https://{{ ansible_host }}:6443"
      delegate_to: localhost
      become: false

    - name: Protect local kubeconfig
      ansible.builtin.file:
        path: "{{ kubeconfig_path }}"
        mode: "0600"
      delegate_to: localhost
      become: false
