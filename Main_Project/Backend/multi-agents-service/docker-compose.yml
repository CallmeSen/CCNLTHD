version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/financial_advisor
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-3-flash-preview}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-2}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - BENCHMARK_TICKER=${BENCHMARK_TICKER:-^GSPC}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STORAGE_BASE=/app/storage
      # - REDIS_URL=redis://redis:6379/0  # TODO: uncomment when Redis is enabled
    depends_on:
      - db
      # - redis  # TODO: uncomment when Redis service is enabled
    volumes:
      - ./storage:/app/storage
    command: /app/.venv/bin/uvicorn src.fin_agents.api.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:15-alpine
    container_name: fin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: financial_advisor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d financial_advisor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:  # TODO: uncomment when Redis caching is implemented
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  # redis_data:  # TODO: uncomment when Redis caching is implemented
