server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      httpclient:
        response-timeout: 300000
        connect-timeout: 10000
      routes:
        # User Service — public auth + protected user endpoints
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

        # Market Data Service
        - id: market-data-service
          uri: lb://market-data-service
          predicates:
            - Path=/api/market/**
          filters:
            - AuthenticationFilter

        # Portfolio Service
        - id: portfolio-service
          uri: lb://portfolio-service
          predicates:
            - Path=/api/portfolios/**
          filters:
            - AuthenticationFilter

        # Notification Service
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - AuthenticationFilter

        # AI Intelligence Service (Multi-agents-service — Python, registered via Eureka)
        - id: ai-intelligence-service
          uri: lb://ai-intelligence-service
          predicates:
            - Path=/api/ai/**
          filters:
            - AuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:InvestAdvisorJwtSecretKeyMustBeAtLeast256BitsLong2024!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes,metrics
  endpoint:
    health:
      show-details: always
