server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      httpclient:
        response-timeout: 300000
        connect-timeout: 10000
      # Try disabling Spring Cloud LoadBalancer reactive support to avoid
      # RouteLocator URI parsing issues in SC Gateway 4.x.
      loadbalancer:
        enabled: false

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: false
    register-with-eureka: false
  instance:
    prefer-ip-address: false

jwt:
  secret: ${JWT_SECRET:InvestAdvisorJwtSecretKeyMustBeAtLeast256BitsLong2024!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes,metrics
  endpoint:
    health:
      show-details: always
