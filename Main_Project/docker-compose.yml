# ──────────────────────────────────────────────────────────────────────────────
# InvestAdvisor Platform — Unified Docker Compose
# ──────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d            # start everything
#   docker compose up -d --build   # rebuild all images first
#   docker compose down -v          # stop and remove volumes
# ──────────────────────────────────────────────────────────────────────────────

# ── Shared environment variables ──────────────────────────────────────────────
x-common-env: &common-env
  DB_HOST: postgres
  DB_USERNAME: ${POSTGRES_USER:-postgres}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  KAFKA_BROKERS: kafka:9092
  EUREKA_HOST: eureka-server
  JWT_SECRET: ${JWT_SECRET:-InvestAdvisorJwtSecretKeyMustBeAtLeast256BitsLong2024!}
  VNSTOCK_API_KEY: ${VNSTOCK_API_KEY:-}
  MARKET_DATA_HOST: market-data-service

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: invest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_ma:
    image: postgres:15-alpine
    container_name: fin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: financial_advisor
    volumes:
      - postgres_ma_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d financial_advisor"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: invest_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: invest_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    command: >
      bash -c "
        rm -f /var/lib/kafka/data/meta.properties &&
        /etc/confluent/docker/run
      "
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: invest_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: invest-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Service Discovery ───────────────────────────────────────────────────────

  eureka-server:
    build:
      context: ./Backend/eureka-server
      dockerfile: Dockerfile
    container_name: invest_eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./Backend/api-gateway
      dockerfile: Dockerfile
    container_name: invest_gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      portfolio-service:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT:-8085}:8080"
    environment:
      <<: *common-env
      MULTI_AGENTS_HOST: fin_multi_agents
      SPRING_AUTOCONFIGURE_EXCLUDE: "org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration"
      SPRING_CLOUD_GATEWAY_HTTP_CLIENT_RESPONSE_TIMEOUT: 300000
      SPRING_CLOUD_GATEWAY_HTTP_CLIENT_CONNECT_TIMEOUT: 10000
      SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_0: "http://localhost:5173"
      SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_1: "http://localhost:3000"
      SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_2: "http://127.0.0.1:5173"
      SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWEDORIGINPATTERNS_3: "http://127.0.0.1:3000"
      SPRING_CLOUD_GATEWAY_GLOBAL_CORS_CORS-CONFIGURATIONS_0_ALLOWCREDENTIALS: "false"

  # ── Microservices ────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./Backend/user-service
      dockerfile: Dockerfile
    container_name: invest_user_svc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 20s
      timeout: 10s
      retries: 6

  market-data-service:
    build:
      context: ./Backend/market-data-service
      dockerfile: Dockerfile
    container_name: invest_market_svc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      <<: *common-env

  portfolio-service:
    build:
      context: ./Backend/portfolio-service
      dockerfile: Dockerfile
    container_name: invest_portfolio_svc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s

  notification-service:
    build:
      context: ./Backend/notification-service
      dockerfile: Dockerfile
    container_name: invest_notification_svc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@investadvisor.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}

  multi-agents-service:
    build:
      context: ./Backend/multi-agents-service
      dockerfile: Dockerfile
    container_name: fin_multi_agents
    restart: unless-stopped
    depends_on:
      postgres_ma:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8086:8086"
    env_file:
      - ./Backend/multi-agents-service/.env
    environment:
      DATABASE_URL: postgresql://user:password@postgres_ma:5432/financial_advisor
      KAFKA_BROKERS: kafka:9092
      EUREKA_HOST: eureka-server

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: invest_frontend
    restart: unless-stopped
    ports:
      - "80:80"

  # ── Monitoring ──────────────────────────────────────────────────────────────

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: invest_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"

  grafana-alloy:
    image: grafana/alloy:v1.4.0
    container_name: invest_grafana_alloy
    restart: unless-stopped
    volumes:
      - ./Backend/monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      GRAFANA_PROM_URL:   ${GRAFANA_PROM_URL}
      GRAFANA_PROM_USER:  ${GRAFANA_PROM_USER}
      GRAFANA_PROM_TOKEN: ${GRAFANA_PROM_TOKEN}
      GRAFANA_LOKI_URL:   ${GRAFANA_LOKI_URL}
      GRAFANA_LOKI_USER:  ${GRAFANA_LOKI_USER}
      GRAFANA_LOKI_TOKEN: ${GRAFANA_LOKI_TOKEN}
    command:
      - run
      - /etc/alloy/config.alloy
    depends_on:
      - node-exporter

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  postgres_ma_data:
  zookeeper_data:
  kafka_data:
