name: CI - Backend (Java)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  JAVA_VERSION: "17"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Eureka Server
  # ──────────────────────────────────────────────────────────────────────────────
  ci-eureka:
    name: Eureka Server
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'Main_Project/Backend/eureka-server/') ||
      contains(github.event.pull_request.changed_files, 'Main_Project/Backend/docker-compose.yml')
    defaults:
      run:
        working-directory: Main_Project/Backend/eureka-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: eclipse-temurin
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check -B -q

      - name: Compile
        run: mvn compile -B -q

      - name: Test
        run: mvn test -B
        continue-on-error: false

      - name: Build JAR
        run: mvn package -DskipTests -B -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: Main_Project/Backend/eureka-server
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/eureka-server:${{ github.ref == 'refs/heads/main' && 'latest' || format('pr-{0}', github.event.pull_request.number) }}
            ${{ github.event_name == 'push' && format('pr-{0}', github.event.pull_request.number) == 'pr-' && format('v{0}', github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-eureka
          path: "**/target/surefire-reports/*.xml"

