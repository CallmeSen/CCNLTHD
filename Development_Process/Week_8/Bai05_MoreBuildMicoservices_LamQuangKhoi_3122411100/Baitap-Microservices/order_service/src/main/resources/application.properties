############################################
# ORDER SERVICE - CORE SETTINGS
############################################
spring.application.name=order-service
server.port=8082

############################################
# DATABASE (MySQL via XAMPP)
# 1) Start Apache + MySQL in XAMPP
# 2) Create DB: order_db
# 3) Create user if needed, or use root
############################################
spring.datasource.url=${ORDER_DB_URL:jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ORDER_DB_USERNAME:root}
spring.datasource.password=${ORDER_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

############################################
# EUREKA DISCOVERY
############################################
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

############################################
# KAFKA
############################################
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.notification-topic=notificationTopic

############################################
# INVENTORY SERVICE BASE URL (for next step)
############################################
inventory.service.base-url=${INVENTORY_SERVICE_URL:http://localhost:8081}
inventory.service.in-stock-path=${INVENTORY_IN_STOCK_PATH:/api/inventory}

############################################
# RESILIENCE4J (for inventory call in next step)
############################################
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=10s
resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=500ms
resilience4j.timelimiter.instances.inventoryService.timeout-duration=2s

############################################
# ACTUATOR + PROMETHEUS + TRACING
############################################
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
