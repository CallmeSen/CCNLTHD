spring.application.name=inventory-service
spring.datasource.url=${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory}
spring.datasource.username=${INVENTORY_DB_USERNAME:thaituan}
spring.datasource.password=${INVENTORY_DB_PASSWORD:123}
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8081

#Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

#Eureka
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
#eureka.client.serviceUrl.defaultZone=http://eureka-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
#eureka.instance.prefer-ip-address=false
spring.security.user.name=eureka
spring.security.user.password=password

# Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted

# Micrometer Tracing + Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}














