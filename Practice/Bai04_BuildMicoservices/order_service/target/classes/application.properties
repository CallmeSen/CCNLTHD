spring.application.name=order-service
server.port=8082

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

spring.datasource.url=${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
spring.datasource.username=${ORDER_DB_USERNAME:order_user}
spring.datasource.password=${ORDER_DB_PASSWORD:order_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.notification-topic=notificationTopic

inventory.service.base-url=${INVENTORY_SERVICE_URL:http://localhost:8081}

resilience4j.circuitbreaker.instances.inventoryService.register-health-indicator=true
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=10s

resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=500ms

resilience4j.timelimiter.instances.inventoryService.timeout-duration=2s
