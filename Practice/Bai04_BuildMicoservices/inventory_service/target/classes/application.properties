spring.application.name=inventory-service
server.port=8081

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

spring.datasource.url=${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${INVENTORY_DB_USERNAME:inventory_user}
spring.datasource.password=${INVENTORY_DB_PASSWORD:inventory_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
