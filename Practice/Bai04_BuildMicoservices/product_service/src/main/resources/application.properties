spring.application.name=product-service
server.port=8083

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

spring.data.mongodb.uri=${PRODUCT_MONGO_URI:mongodb://product_user:product_password@localhost:27017/product_db?authSource=admin}
